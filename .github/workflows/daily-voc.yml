name: Customer Pulse - Daily VoC

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6 AM UTC
  workflow_dispatch:       # Manual trigger button

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VoC Pipeline
        run: python main.py --platforms ios,mac,android || python error_dashboard.py "$?"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSTEM_ACCESSTOKEN: ${{ secrets.ADO_PAT }}

      - name: Upload to SharePoint
        run: |
          if [ -z "$GRAPH_CLIENT_ID" ]; then
            echo "SharePoint secrets not configured, skipping upload"
            exit 0
          fi
          python upload_to_sharepoint.py
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_FOLDER: ${{ vars.SHAREPOINT_FOLDER }}

      - name: Deploy to GitHub Pages
        run: |
          cd output_v3
          # Rename dashboard to index.html for GitHub Pages
          cp pulse_dashboard_v3.html index.html
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-temp
          git rm -rf . 2>/dev/null || true
          cp -r output_v3/* .
          git add index.html pulse_dashboard_v3.html architecture.html 2>/dev/null || git add index.html
          git commit -m "Deploy dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:gh-pages --force

      - name: Send Teams Notification
        if: always()
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "Teams webhook not configured, skipping notification"
            exit 0
          fi
          python notify_teams.py
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SHAREPOINT_DASHBOARD_URL: ${{ vars.SHAREPOINT_DASHBOARD_URL }}

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voc-dashboard
          path: output_v3/
          retention-days: 30
