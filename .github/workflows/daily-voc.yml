name: Customer Pulse - Daily VoC

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6 AM UTC
  workflow_dispatch:
    inputs:
      semantic_match:
        description: 'Use semantic (embedding + LLM) ADO matching'
        type: boolean
        default: false
      platforms:
        description: 'Platforms to analyze'
        type: string
        default: 'ios,mac,android'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VoC Pipeline (with retry)
        id: pipeline
        run: |
          PLATFORMS="${{ inputs.platforms || 'ios,mac,android' }}"
          EXTRA_FLAGS=""
          if [ "${{ inputs.semantic_match }}" = "true" ]; then
            EXTRA_FLAGS="--semantic-match"
            echo "::notice::Semantic matching enabled (embeddings + LLM re-rank)"
          fi

          # Attempt 1
          if python main.py --platforms "$PLATFORMS" $EXTRA_FLAGS; then
            echo "pipeline_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Pipeline failed on first attempt, retrying in 5 minutes..."
            echo "first_error=$(date -u '+%H:%M UTC')" >> "$GITHUB_OUTPUT"
            sleep 300

            # Attempt 2 (fresh data, no cache)
            if python main.py --platforms "$PLATFORMS" $EXTRA_FLAGS --no-cache; then
              echo "pipeline_status=success_after_retry" >> "$GITHUB_OUTPUT"
            else
              exit_code=$?
              echo "pipeline_status=failed" >> "$GITHUB_OUTPUT"
              python error_dashboard.py "$exit_code"
            fi
          fi
        env:
          ANALYSIS_PROVIDER: ${{ vars.ANALYSIS_PROVIDER || 'copilot' }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSTEM_ACCESSTOKEN: ${{ secrets.ADO_PAT }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

      - name: Upload to SharePoint
        if: steps.pipeline.outputs.pipeline_status != 'failed'
        run: |
          if [ -z "$GRAPH_CLIENT_ID" ]; then
            echo "SharePoint secrets not configured, skipping upload"
            exit 0
          fi
          python upload_to_sharepoint.py
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_FOLDER: ${{ vars.SHAREPOINT_FOLDER }}

      - name: Send Teams Notification
        if: always()
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "Teams webhook not configured, skipping notification"
            exit 0
          fi
          python notify_teams.py
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SHAREPOINT_DASHBOARD_URL: ${{ vars.SHAREPOINT_DASHBOARD_URL }}
          ANALYSIS_PROVIDER: ${{ vars.ANALYSIS_PROVIDER || 'copilot' }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSTEM_ACCESSTOKEN: ${{ secrets.ADO_PAT }}
          PIPELINE_STATUS: ${{ steps.pipeline.outputs.pipeline_status }}
          PIPELINE_FIRST_ERROR_TIME: ${{ steps.pipeline.outputs.first_error }}

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voc-dashboard
          path: output_v3/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always()
        run: |
          cd output_v3
          cp pulse_dashboard_v3.html index.html
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-temp
          git rm -rf . 2>/dev/null || true
          cp -r output_v3/* .
          git add index.html pulse_dashboard_v3.html architecture.html 2>/dev/null || git add index.html
          git commit -m "Deploy dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:gh-pages --force
