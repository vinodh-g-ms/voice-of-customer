name: Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=80 -v --tb=short
        env:
          ANTHROPIC_API_KEY: ""
          GITHUB_TOKEN: ""
          SYSTEM_ACCESSTOKEN: ""
